apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: docker.io/envoyproxy
    targetRevision: v1.7.0
    chart: gateway-helm
    helm:
      valuesObject: {}
      skipCrds: true
  destination:
    name: in-cluster
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
