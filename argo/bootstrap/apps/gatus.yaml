apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatus
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  sources:
    - repoURL: https://github.com/anokfireball/cloud-as-code
      targetRevision: main
      path: argo/apps/gatus
    - repoURL: https://twin.github.io/helm-charts
      chart: gatus
      targetRevision: 1.5.0
      helm:
        valuesObject:
          image:
            repository: ghcr.io/twin/gatus
            # renovate: datasource=docker depName=ghcr.io/twin/gatus
            tag: "v5.34.0"
          annotations:
            reloader.stakater.com/auto: "true"
          ingress:
            enabled: false
          gateway:
            route:
              enabled: true
              parentRefs:
                - name: envoy
                  namespace: default
              hosts:
                - gatus.kthxbye.cyou
              path: /
          env:
            SERVICE_DOMAIN:
              valueFrom:
                secretKeyRef:
                  name: gatus-secrets
                  key: SERVICE_DOMAIN
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: gatus-postgres-user
                  key: username
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: gatus-postgres-user
                  key: password
          externalConfigMap: gatus
  destination:
    name: in-cluster
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
