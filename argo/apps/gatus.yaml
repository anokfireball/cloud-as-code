apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gatus-postgresql
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2-32@sha256:b17d21f8ec36add9b3c0ea3fb354d05f62a8fddf8ba65ae94e63ba77bc42202e
  instances: 3
  enablePDB: true
  # Keep one instance per node; without spare nodes, a lost node leaves Gatus degraded.
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
  bootstrap:
    initdb:
      database: gatus
      owner: gatus
      secret:
        name: gatus-postgres-user
  storage:
    storageClass: local-path
    size: 15Gi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatus
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  sources:
    - repoURL: https://twin.github.io/helm-charts
      chart: gatus
      targetRevision: 1.5.0
      helm:
        valuesObject:
          image:
            repository: ghcr.io/twin/gatus
            # renovate: datasource=docker depName=ghcr.io/twin/gatus
            tag: "v5.34.0"
          annotations:
            reloader.stakater.com/auto: "true"
          ingress:
            enabled: false
          gateway:
            route:
              enabled: true
              parentRefs:
                - name: envoy
                  namespace: default
              hosts:
                - gatus.kthxbye.cyou
              path: /
          env:
            SERVICE_DOMAIN:
              valueFrom:
                secretKeyRef:
                  name: gatus-secrets
                  key: SERVICE_DOMAIN
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: gatus-postgres-user
                  key: username
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: gatus-postgres-user
                  key: password
          externalConfigMap: gatus
  destination:
    name: in-cluster
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
