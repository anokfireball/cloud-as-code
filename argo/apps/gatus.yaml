apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatus
  namespace: argocd-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: gatus-runtime
      namespace: default
      jsonPointers:
        - /data/maintenance.yaml
    - group: apps
      kind: Deployment
      name: gatus
      namespace: default
      jqPathExpressions:
        - .spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"
        - .spec.template.metadata.annotations."reloader.stakater.com/last-reloaded-from"
  sources:
    - repoURL: https://github.com/anokfireball/cloud-as-code
      targetRevision: main
      path: argo/apps/gatus
    - repoURL: https://twin.github.io/helm-charts
      chart: gatus
      targetRevision: 1.5.0
      helm:
        valuesObject:
          image:
            repository: ghcr.io/twin/gatus
            tag: "v5.34.0" # renovate: datasource=docker depName=ghcr.io/twin/gatus
          annotations:
            secret.reloader.stakater.com/auto: "true"
          ingress:
            enabled: false
          gateway:
            route:
              enabled: true
              parentRefs:
                - name: envoy
                  namespace: default
              hosts:
                - gatus.kthxbye.cyou
              path: /
          env:
            GATUS_CONFIG_PATH: /config
            SERVICE_DOMAIN:
              valueFrom:
                secretKeyRef:
                  name: gatus-secrets
                  key: SERVICE_DOMAIN
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: gatus-postgres-user
                  key: username
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: gatus-postgres-user
                  key: password
          extraVolumeMounts:
            - name: gatus-runtime
              mountPath: /config/runtime
              readOnly: true
              existingConfigMap: gatus-runtime
          externalConfigMap: gatus
  destination:
    name: in-cluster
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
